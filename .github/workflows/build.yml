name: Build Ubuntu binary

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build binary
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name thermal-frame-normalizer thermal_frame_normalizer/__main__.py

      - name: Pack artifact
        run: |
          tar -czf thermal-frame-normalizer-linux.tar.gz -C dist thermal-frame-normalizer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: thermal-frame-normalizer-linux
          path: thermal-frame-normalizer-linux.tar.gz
          if-no-files-found: error
